<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#174a3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Handleliste">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Handleliste</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <main class="app-shell">
    <header class="topbar">
      <h1>Handleliste</h1>
      <div class="store-banner">
        <span id="activeStoreLabel">Velg butikk</span>
        <label class="top-store-select-wrap">
          <span>Bytt butikk</span>
          <select id="homeStoreSelect"></select>
        </label>
        <button id="detectStoreBtn" class="btn secondary" type="button">Finn butikk i nærheten</button>
      </div>
      <div id="statusMessage" class="status" role="status" aria-live="polite"></div>
    </header>

    <nav class="tabs" aria-label="Seksjoner">
      <button class="tab is-active" data-tab="home">Hjem</button>
      <button class="tab" data-tab="list">Liste</button>
      <button class="tab" data-tab="stores">Butikker</button>
      <button class="tab" data-tab="categories">Kategorier</button>
      <button class="tab" data-tab="history">Historikk</button>
    </nav>

    <section class="panel is-active" id="panel-home" data-panel="home">
      <section class="card home-card">
        <div class="home-center-actions">
          <button id="homeStartTripBtn" class="btn primary home-main-btn" type="button">Start Handel</button>
          <button id="homeCreateListBtn" class="btn secondary home-sub-btn" type="button">Lag handleliste</button>
        </div>
        <div class="home-bottom-login">
          <button id="loginBtn" class="btn tiny" type="button">Login</button>
        </div>
      </section>
    </section>

    <section class="panel" id="panel-list" data-panel="list">
      <form id="addItemForm" class="card form-grid">
        <label class="item-name-wrap">
          Vare
          <input id="itemNameInput" name="itemName" type="text" placeholder="Melk" autocomplete="off" required>
          <div id="itemSuggestions" class="autocomplete-list" role="listbox"></div>
        </label>
        <label>
          Antall
          <input id="itemQtyInput" name="itemQty" type="text" placeholder="1">
        </label>
        <label>
          Kategori
          <select id="itemCategorySelect" name="itemCategory"></select>
        </label>
        <button class="btn primary" type="submit">Legg til vare</button>
      </form>

      <section class="card controls-row">
        <button id="reuseLastBtn" class="btn secondary" type="button">Gjenbruk forrige liste</button>
      </section>

      <section class="card" id="listCard">
        <div class="list-head">
          <h2>Nåværende liste</h2>
          <button id="exitTripBtn" class="trip-close" type="button" aria-label="Avslutt handletur">X</button>
        </div>
        <div id="listContainer" class="list-container"></div>
      </section>
    </section>

    <section class="panel" id="panel-stores" data-panel="stores">
      <section class="card">
        <h2>Finn butikker</h2>
        <form id="storeSearchForm" class="search-form">
          <label>
            Sted eller område
            <input id="storeAreaInput" name="areaQuery" type="text" placeholder="F.eks. Trondheim sentrum" required>
          </label>
          <label>
            Søkeradius i meter
            <input id="storeSearchRadiusInput" name="searchRadius" type="number" min="200" step="100" value="2000" required>
          </label>
          <div class="row-actions">
            <button class="btn primary" type="submit">Søk butikker</button>
            <button id="searchNearMeBtn" class="btn secondary" type="button">Søk nær min posisjon</button>
          </div>
        </form>
        <p id="storeSearchMeta" class="item-sub"></p>
        <div id="storeSearchResults" class="stack"></div>
      </section>

      <section class="card">
        <h2>Lagrede butikker</h2>
        <div id="storesContainer" class="stack"></div>
      </section>

      <section class="card">
        <h2>Kategori-rekkefølge for aktiv butikk</h2>
        <div id="storeOrderContainer" class="stack"></div>
      </section>
    </section>

    <section class="panel" id="panel-categories" data-panel="categories">
      <form id="addCategoryForm" class="card inline-form">
        <h2>Kategorier</h2>
        <input name="categoryName" type="text" placeholder="Frys" required>
        <button class="btn primary" type="submit">Legg til kategori</button>
      </form>
      <section class="card">
        <div id="categoriesContainer" class="stack"></div>
      </section>
    </section>

    <section class="panel" id="panel-history" data-panel="history">
      <section class="card">
        <h2>Varehistorikk</h2>
        <p>Varer blir liggende her til du sletter dem. Brukes til forslag og rask gjenbruk av liste.</p>
        <div id="catalogContainer" class="stack"></div>
      </section>
    </section>
  </main>

  <div id="authModal" class="modal" aria-hidden="true">
    <section class="modal-card">
      <h2 id="authModalTitle">Login</h2>
      <p id="authModalSubtitle" class="item-sub">Logg inn med e-post og passord.</p>
      <form id="authForm" class="search-form">
        <label>
          E-post
          <input id="authEmailInput" type="email" placeholder="navn@epost.no" required>
        </label>
        <label>
          Passord
          <input id="authPasswordInput" type="password" placeholder="Minst 6 tegn" autocomplete="current-password" required>
        </label>
        <div class="row-actions">
          <button id="authSubmitBtn" class="btn primary" type="submit">Logg inn</button>
          <button id="authSignupBtn" class="btn secondary" type="button">Opprett bruker</button>
          <button id="authResetBtn" class="btn secondary" type="button">Glemt passord</button>
          <button id="authCancelBtn" class="btn secondary" type="button">Avbryt</button>
        </div>
      </form>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js" defer></script>
</body>
</html>
